<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>授权码申请 - License Server</title>
<style>
* { margin:0; padding:0; box-sizing: border-box; }
body { font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f5f7fa; color: #333; min-height: 100vh; }
.navbar { background: #fff; border-bottom: 1px solid #e4e7ed; padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.navbar .logo { font-size: 20px; font-weight: 700; color: #409eff; text-decoration: none; }
.container { max-width: 640px; margin: 40px auto; padding: 0 16px; }
.card { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 32px; }
.card h2 { font-size: 22px; font-weight: 600; color: #303133; margin-bottom: 8px; }
.card-subtitle { font-size: 14px; color: #909399; margin-bottom: 28px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 14px; color: #606266; margin-bottom: 8px; font-weight: 500; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border:1px solid #dcdfe6; border-radius: 4px; font-size: 14px; transition: border-color .2s; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #409eff; }
.form-group textarea { min-height: 90px; resize: vertical; }
.form-hint { font-size: 12px; color: #909399; margin-top: 4px; }
.checkbox-group { display: flex; flex-direction: column; gap: 10px; margin-top: 6px; }
.checkbox-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border: 1px solid #dcdfe6; border-radius: 4px; cursor: pointer; transition: border-color .2s; }
.checkbox-item:hover { border-color: #409eff; }
.checkbox-item input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
.checkbox-item span { font-size: 14px; color: #606266; cursor: pointer; }
.product-name { font-weight: 500; color: #303133; }
.product-desc { font-size: 12px; color: #909399; margin-left: 4px; }
.btn { display: inline-block; padding: 10px 24px; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; transition: all .2s; }
.btn-primary { background: #409eff; color: #fff; width: 100%; }
.btn-primary:hover { background: #66b1ff; }
.btn-primary:disabled { opacity: .6; cursor: not-allowed; }
.alert { padding: 12px 16px; border-radius: 4px; margin-bottom: 20px; font-size: 14px; display: none; }
.alert-success { background: #f0f9eb; color: #67c23a; border: 1px solid #e1f3d8; }
.alert-error { background: #fef0f0; color: #f56c6c; border: 1px solid #fde2e2; }
.result-box { display: none; background: #f0f9eb; border: 1px solid #e1f3d8; border-radius: 8px; padding: 24px; margin-top: 24px; text-align: center; }
.result-box h3 { color: #67c23a; font-size: 18px; margin-bottom: 12px; }
.result-key { font-size: 24px; font-weight: 700; color: #303133; background: #fff; border: 1px solid #dcdfe6; border-radius: 4px; padding: 12px; margin: 12px 0; letter-spacing: 2px; }
.result-hint { font-size: 13px; color: #909399; }
.footer { text-align: center; font-size: 13px; color: #c0c4cc; margin-top: 40px; }
.admin-link { text-align: right; margin-bottom: 16px; }
.admin-link a { font-size: 13px; color: #909399; text-decoration: none; }
.admin-link a:hover { color: #409eff; }
</style>
</head>
<body>

<div class="navbar">
  <a href="/" class="logo">🔐 License Server</a>
  <div>
    <a href="/admin/login" style="font-size:14px;color:#606266;text-decoration:none;">管理后台</a>
  </div>
</div>

<div class="container">
  <div class="admin-link"><a href="/admin/login">→ 管理员入口</a></div>

  <div class="card">
    <h2>授权码申请</h2>
    <p class="card-subtitle">请填写以下信息，提交申请后我们的工作人员会尽快审核处理</p>

    <div class="alert alert-success" id="successAlert"></div>
    <div class="alert alert-error" id="errorAlert"></div>

    <form id="applyForm">
      <div class="form-group">
        <label>公司 / 个人名称 *</label>
        <input type="text" name="applicant_name" required placeholder="请输入公司名称或个人姓名">
      </div>
      <div class="form-group">
        <label>联系邮箱 *</label>
        <input type="email" name="email" required placeholder="用于接收审核结果通知">
      </div>
      <div class="form-group">
        <label>联系电话</label>
        <input type="text" name="phone" placeholder="选填">
      </div>
      <div class="form-group">
        <label>产品类型 *（可多选）</label>
        <div class="checkbox-group" id="productCheckboxes">
          <span style="color:#909399;font-size:13px;">加载中...</span>
        </div>
      </div>
      <div class="form-group">
        <label>授权时长 *</label>
        <select name="duration_months" required>
          <option value="">请选择授权时长</option>
          <option value="1">1 个月</option>
          <option value="3">3 个月</option>
          <option value="6">6 个月</option>
          <option value="12" selected>12 个月（1年）</option>
          <option value="24">24 个月（2年）</option>
          <option value="36">36 个月（3年）</option>
          <option value="1188">长期（99年）</option>
        </select>
      </div>
      <div class="form-group">
        <label>最大激活设备数 *</label>
        <select name="max_activations" required>
          <option value="1" selected>1 台设备</option>
          <option value="3">3 台设备</option>
          <option value="5">5 台设备</option>
          <option value="10">10 台设备</option>
          <option value="0">无限制</option>
        </select>
      </div>
      <div class="form-group">
        <label>申请说明</label>
        <textarea name="description" placeholder="请简要说明使用场景或需求（选填）"></textarea>
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">提交申请</button>
    </form>

    <div class="result-box" id="resultBox">
      <h3>✅ 申请已提交</h3>
      <p>您的申请正在审核中，审核结果将发送至您的邮箱</p>
      <div style="margin-top:16px;">
        <strong>申请编号：</strong><span id="applyId"></span>
      </div>
      <p class="result-hint" style="margin-top:12px;">审核通过后，授权码将随邮件一同发送给您</p>
    </div>
  </div>

  <div class="footer">如有疑问，请联系客服邮箱 support@example.com</div>
</div>

<script>
// 加载产品列表
async function loadProducts() {
  try {
    const resp = await fetch('/api/v1/products');
    const result = await resp.json();
    const container = document.getElementById('productCheckboxes');
    if (result.products && result.products.length > 0) {
      container.innerHTML = '';
      result.products.forEach(p => {
        const item = document.createElement('label');
        item.className = 'checkbox-item';
        item.innerHTML = `
          <input type="checkbox" name="product_keys" value="${p.product_key}">
          <span><span class="product-name">${p.name}</span><span class="product-desc">${p.description || ''}</span></span>
        `;
        container.appendChild(item);
      });
    } else {
      container.innerHTML = '<span style="color:#f56c6c;font-size:13px;">暂无可用产品，请联系管理员</span>';
    }
  } catch(err) {
    document.getElementById('productCheckboxes').innerHTML = '<span style="color:#f56c6c;font-size:13px;">加载产品列表失败</span>';
  }
}

loadProducts();

document.getElementById('applyForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '提交中...';

  // 收集表单数据
  const formData = new FormData(this);
  const data = {};
  formData.forEach((v, k) => {
    if (k !== 'product_keys') data[k] = v;
  });

  // 收集勾选的产品
  const checked = document.querySelectorAll('input[name="product_keys"]:checked');
  if (checked.length === 0) {
    showError('请至少选择一个产品类型');
    btn.disabled = false;
    btn.textContent = '提交申请';
    return;
  }
  data['product_keys'] = Array.from(checked).map(cb => cb.value);

  try {
    const resp = await fetch('/api/v1/apply', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const result = await resp.json();
    if (resp.ok) {
      document.getElementById('successAlert').style.display = 'none';
      document.getElementById('errorAlert').style.display = 'none';
      document.getElementById('applyForm').style.display = 'none';
      document.getElementById('resultBox').style.display = 'block';
      document.getElementById('applyId').textContent = result.apply_id || '-';
    } else {
      showError(result.error || '提交失败，请稍后重试');
      btn.disabled = false;
      btn.textContent = '提交申请';
    }
  } catch(err) {
    showError('网络错误，请稍后重试');
    btn.disabled = false;
    btn.textContent = '提交申请';
  }
});

function showError(msg) {
  const el = document.getElementById('errorAlert');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
